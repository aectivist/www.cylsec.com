{% extends "base.html" %}
{% block hero %}{% endblock %}
{% block title %}Change Email – CYLVERN SECURITY{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>CYLVERN SECURITY</h1>
        <h2>Change Email</h2>
        <form method="POST" action="{{ url_for('auth.change_email') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="new_email">New Email</label>
                <input type="email" id="new_email" name="new_email" class="form-control" required>
                <small style="color:#888;">Current: {{ current_user.email }}</small>
            </div>
            <button type="submit" class="btn-primary">Update Email</button>
        </form>
        <p><a href="{{ url_for('main.index') }}">Cancel</a></p>
    </div>
</div>
{% endblock %}
