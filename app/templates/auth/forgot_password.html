{% extends "base.html" %}
{% block hero %}{% endblock %}
{% block title %}Forgot Password – CYLVERN SECURITY{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>CYLVERN SECURITY</h1>
        <h2>Reset Password</h2>
        <p style="color:#aaa;text-align:center;margin-bottom:1.5rem;">Enter your email address and we'll send you a reset link.</p>
        <form method="POST" action="{{ url_for('auth.forgot_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>
        <p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
    </div>
</div>
{% endblock %}
