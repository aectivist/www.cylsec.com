{% extends "base.html" %}
{% block hero %}{% endblock %}
{% block title %}Verify OTP – CYLVERN SECURITY{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>CYLVERN SECURITY</h1>
        <h2>Verify OTP</h2>
        <p style="color:#aaa;text-align:center;">A 6‑digit code has been sent to your email.</p>
        <form method="POST" action="{{ url_for('auth.verify_otp') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="code">OTP Code</label>
                <input type="text" id="code" name="code" class="form-control" placeholder="123456" maxlength="6" required>
            </div>
            <button type="submit" class="btn-primary">Verify</button>
        </form>
        <p><a href="{{ url_for('main.index') }}">Cancel</a></p>
    </div>
</div>
{% endblock %}
