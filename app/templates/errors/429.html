{% extends "base.html" %}

{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div class="panel" style="max-width:600px;margin:60px auto;text-align:center;">
    <div style="font-size:4rem;color:var(--purple);text-shadow:0 0 30px var(--purple);">429</div>
    <h2 style="color:#fff;margin:20px 0;">Too Many Requests</h2>
    <p style="color:#aaa;">You have made too many requests. Please slow down and try again later.</p>
    <p style="color:#777;margin-top:10px;">Your IP has been temporarily limited.</p>
    <div style="margin-top:30px;">
        <a href="{{ url_for('main.index') }}" class="btn-primary">Return to Home</a>
    </div>
</div>
{% endblock %}
