{% extends "base.html" %}

{% block title %}Resend Confirmation{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>CYLVERN SECURITY</h1>
        <h2>Resend Confirmation</h2>
        <form method="POST" action="{{ url_for('auth.resend_confirmation') }}">
            {{ csrf_token() }}
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <button type="submit" class="btn-primary">Send Confirmation Link</button>
        </form>
        <p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
    </div>
</div>
{% endblock %}
